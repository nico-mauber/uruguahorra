name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '18'

jobs:
  # Job 1: Lint y Type Check
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔍 Run ESLint
        run: npm run lint

      - name: 🔍 TypeScript type check
        run: npx tsc --noEmit

  # Job 2: Security Audit
  security:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔒 Run npm audit
        run: npm audit --audit-level=moderate
        continue-on-error: true # No fallar el CI por vulnerabilidades conocidas

      - name: 📊 Check for outdated packages
        run: npm outdated || true

  # Job 3: Tests (cuando estén disponibles)
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    if: false # Deshabilitado hasta que haya tests

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🧪 Run tests
        run: npm test -- --coverage

      - name: 📊 Upload coverage
        uses: actions/upload-artifact@v3
        with:
          name: coverage-report
          path: coverage/

  # Job 4: Build Verification
  build:
    name: Build Verification
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck]

    strategy:
      matrix:
        platform: [web, android, ios]

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🏗️ Build for ${{ matrix.platform }}
        run: |
          if [ "${{ matrix.platform }}" = "web" ]; then
            npm run build:web || echo "Web build needs configuration"
          elif [ "${{ matrix.platform }}" = "android" ]; then
            echo "Android build would run: npm run build:android"
          elif [ "${{ matrix.platform }}" = "ios" ]; then
            echo "iOS build would run: npm run build:ios"
          fi

      - name: 📊 Check bundle size
        if: matrix.platform == 'web'
        run: |
          if [ -d "web-build" ]; then
            echo "Bundle size: $(du -sh web-build | cut -f1)"
          fi

  # Job 5: Code Quality Metrics
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 📊 Check for unused dependencies
        run: npx depcheck --json || true

      - name: 📊 Count lines of code
        run: |
          echo "TypeScript/TSX files:"
          find src -name "*.ts" -o -name "*.tsx" | wc -l
          echo "Total lines of code:"
          find src -name "*.ts" -o -name "*.tsx" | xargs wc -l | tail -1

  # Job 6: Release (solo en main)
  prepare-release:
    name: Prepare Release
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, security, build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🏷️ Get version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: 📝 Create release notes
        run: |
          echo "## Release v${{ steps.version.outputs.version }}" > release-notes.md
          echo "" >> release-notes.md
          echo "### Changes in this release:" >> release-notes.md
          git log --pretty=format:"- %s" -n 10 >> release-notes.md

      - name: 📤 Upload release notes
        uses: actions/upload-artifact@v3
        with:
          name: release-notes
          path: release-notes.md

  # Notificaciones (opcional)
  notify:
    name: Notify Results
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, security, build, code-quality]
    if: always()

    steps:
      - name: 📊 Summary
        run: |
          echo "## Pipeline Summary"
          echo "- Lint: ${{ needs.lint-and-typecheck.result }}"
          echo "- Security: ${{ needs.security.result }}"
          echo "- Build: ${{ needs.build.result }}"
          echo "- Code Quality: ${{ needs.code-quality.result }}"
