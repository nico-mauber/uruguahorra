<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Generador de Assets - Uruguahorra</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #f3f4f6; }
        .container { max-width: 800px; margin: 0 auto; }
        canvas { border: 1px solid #ddd; margin: 10px; background: white; }
        button { background: #6366F1; color: white; padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; margin: 5px; }
        button:hover { background: #4F46E5; }
        .info { background: #FEF3C7; padding: 15px; border-radius: 8px; margin: 20px 0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎨 Generador de Assets - Uruguahorra App</h1>
        
        <div class="info">
            <p><strong>Instrucciones:</strong></p>
            <ol>
                <li>Haz clic en cada botón para generar el asset</li>
                <li>Haz clic derecho en cada imagen → "Guardar imagen como..."</li>
                <li>Guarda en la carpeta <code>uruguahorra-app/assets/</code></li>
            </ol>
        </div>

        <button onclick="generateIcon()">Generar icon.png (1024x1024)</button>
        <canvas id="icon" width="1024" height="1024"></canvas>

        <button onclick="generateAdaptiveIcon()">Generar adaptive-icon.png (1024x1024)</button>
        <canvas id="adaptive" width="1024" height="1024"></canvas>

        <button onclick="generateSplash()">Generar splash.png (1284x2778)</button>
        <canvas id="splash" width="1284" height="2778" style="max-width: 300px;"></canvas>

        <button onclick="generateFavicon()">Generar favicon.png (32x32)</button>
        <canvas id="favicon" width="32" height="32" style="width: 64px; height: 64px;"></canvas>
    </div>

    <script>
        function generateIcon() {
            const canvas = document.getElementById('icon');
            const ctx = canvas.getContext('2d');
            
            // Fondo con gradiente
            const gradient = ctx.createLinearGradient(0, 0, 1024, 1024);
            gradient.addColorStop(0, '#6366F1');
            gradient.addColorStop(1, '#4F46E5');
            
            // Fondo redondeado
            ctx.fillStyle = gradient;
            roundRect(ctx, 0, 0, 1024, 1024, 224);
            ctx.fill();
            
            // Símbolo de dólar
            ctx.fillStyle = 'white';
            ctx.font = 'bold 480px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('$', 512, 450);
            
            // Texto
            ctx.font = 'bold 120px Arial';
            ctx.fillText('UY', 512, 750);
        }

        function generateAdaptiveIcon() {
            const canvas = document.getElementById('adaptive');
            const ctx = canvas.getContext('2d');
            
            // Fondo transparente (Android lo maneja)
            ctx.clearRect(0, 0, 1024, 1024);
            
            // Círculo central
            ctx.fillStyle = '#6366F1';
            ctx.beginPath();
            ctx.arc(512, 512, 400, 0, Math.PI * 2);
            ctx.fill();
            
            // Símbolo
            ctx.fillStyle = 'white';
            ctx.font = 'bold 400px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('$', 512, 512);
        }

        function generateSplash() {
            const canvas = document.getElementById('splash');
            const ctx = canvas.getContext('2d');
            
            // Fondo con gradiente
            const gradient = ctx.createLinearGradient(0, 0, 0, 2778);
            gradient.addColorStop(0, '#818CF8');
            gradient.addColorStop(0.5, '#6366F1');
            gradient.addColorStop(1, '#4F46E5');
            
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 1284, 2778);
            
            // Círculo decorativo
            ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
            ctx.beginPath();
            ctx.arc(642, 1000, 600, 0, Math.PI * 2);
            ctx.fill();
            
            // Logo central
            ctx.fillStyle = 'white';
            ctx.beginPath();
            ctx.arc(642, 1389, 200, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = '#6366F1';
            ctx.font = 'bold 200px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('$', 642, 1389);
            
            // Texto
            ctx.fillStyle = 'white';
            ctx.font = '60px Arial';
            ctx.fillText('Uruguahorra', 642, 1650);
            
            ctx.font = '36px Arial';
            ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
            ctx.fillText('Tu app de ahorro gamificada', 642, 1720);
        }

        function generateFavicon() {
            const canvas = document.getElementById('favicon');
            const ctx = canvas.getContext('2d');
            
            // Fondo
            ctx.fillStyle = '#6366F1';
            roundRect(ctx, 0, 0, 32, 32, 8);
            ctx.fill();
            
            // Símbolo
            ctx.fillStyle = 'white';
            ctx.font = 'bold 20px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('$', 16, 16);
        }

        function roundRect(ctx, x, y, width, height, radius) {
            ctx.beginPath();
            ctx.moveTo(x + radius, y);
            ctx.lineTo(x + width - radius, y);
            ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
            ctx.lineTo(x + width, y + height - radius);
            ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
            ctx.lineTo(x + radius, y + height);
            ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
            ctx.lineTo(x, y + radius);
            ctx.quadraticCurveTo(x, y, x + radius, y);
            ctx.closePath();
        }

        // Generar todos automáticamente
        window.onload = function() {
            generateIcon();
            generateAdaptiveIcon();
            generateSplash();
            generateFavicon();
        }
    </script>
</body>
</html>
